{{define "admin"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Admin &mdash; stored.ge{{end}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    {{if .CSRFToken}}<meta name="csrf-token" content="{{.CSRFToken}}">{{end}}
    {{block "head" .}}{{end}}
</head>
<body class="admin-body">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <a href="/admin">stored.ge admin</a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="sidebar-link{{if eq .Page "admin-overview"}} sidebar-link--active{{end}}">Overview</a>
                <a href="/admin/tenants" class="sidebar-link{{if eq .Page "admin-tenants"}} sidebar-link--active{{end}}">Tenants</a>
                <a href="/admin/support" class="sidebar-link{{if eq .Page "admin-support"}} sidebar-link--active{{end}}">Support</a>
                <a href="/admin/system" class="sidebar-link{{if eq .Page "admin-system"}} sidebar-link--active{{end}}">System</a>
                <a href="/admin/backends" class="sidebar-link{{if eq .Page "admin-backends"}} sidebar-link--active{{end}}">Backends</a>
                <a href="/admin/audit" class="sidebar-link{{if eq .Page "admin-audit"}} sidebar-link--active{{end}}">Audit Log</a>
                <a href="/admin/waitlist" class="sidebar-link{{if eq .Page "admin-waitlist"}} sidebar-link--active{{end}}">Waitlist</a>
                <a href="/admin/revenue" class="sidebar-link{{if eq .Page "admin-revenue"}} sidebar-link--active{{end}}">Revenue</a>
                <a href="/admin/costs" class="sidebar-link{{if eq .Page "admin-costs"}} sidebar-link--active{{end}}">Costs</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/dashboard" class="sidebar-link">Back to dashboard</a>
                <a href="/logout" class="sidebar-link">Sign out</a>
            </div>
        </aside>
        <main class="admin-main">
            {{block "content" .}}{{end}}
        </main>
    </div>
    <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
        var m = document.querySelector('meta[name="csrf-token"]');
        if (m) evt.detail.headers['X-CSRF-Token'] = m.content;
    });
    </script>
</body>
</html>
{{end}}
