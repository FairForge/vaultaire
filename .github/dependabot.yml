version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # FastCDC chunking core — 0.5.0 breaks build-and-test (PR #319).
      # Revisit after launch; do not auto-bump a dedup-critical dependency.
      - dependency-name: "github.com/restic/chunker"
    groups:
      aws:
        patterns:
          - "github.com/aws/aws-sdk-go*"
      test-dependencies:
        patterns:
          - "*test*"
          - "*mock*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
