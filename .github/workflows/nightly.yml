name: Nightly Tests

on:
  schedule:
    - cron: '0 7 * * *' # 1am MDT / 7am UTC
  workflow_dispatch: # manual trigger

jobs:
  load-and-chaos:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaultaire
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
    - uses: actions/checkout@v7
    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: '1.25'
        cache: true
    - name: Set up database
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -c "CREATE USER viera SUPERUSER;" || true
        psql -h localhost -U postgres -c "CREATE DATABASE vaultaire OWNER viera;" || true
        for f in internal/database/migrations/*.sql; do
          psql -h localhost -U viera -d vaultaire -f "$f"
        done
    - name: Install k6
      run: go install go.k6.io/k6@latest
    - name: Start server
      run: |
        go build -o vaultaire cmd/vaultaire/main.go
        ./vaultaire &
        sleep 5
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost/vaultaire?sslmode=disable
        JWT_SECRET: ci-test-secret-not-for-production
        PORT: "8000"
    - name: Run benchmarks
      run: go test -bench=. -benchtime=10s ./tests/benchmarks/
      continue-on-error: true
    - name: Run k6 load tests
      run: k6 run --quiet tests/k6/s3_basic_load.js
      continue-on-error: true
    - name: Run chaos tests
      run: |
        ./tests/chaos/basic_chaos_test.sh
        go test ./tests/chaos/
      continue-on-error: true
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nightly-results-${{ github.run_number }}
        path: |
          tests/benchmarks/baseline_results.txt
          tests/k6/*.json
