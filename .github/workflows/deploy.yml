name: Deploy

on:
  push:
    branches:
      - develop
      - main
  # Manual lever: GitHub occasionally drops/delays push triggers (observed
  # 2026-07-19, ~25 min with zero runs for the merge SHA). This also gives a
  # clean re-deploy button for DR drills: gh workflow run deploy.yml --ref main
  workflow_dispatch:

# Queue deploys per branch, never cancel one mid-flight: two quick merges to
# main must not interleave their SSH stop/swap/start sequences on the box.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -o vaultaire-linux ./cmd/vaultaire

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultaire-linux
          path: vaultaire-linux

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for migrations)
        uses: actions/checkout@v7
        with:
          sparse-checkout: internal/database/migrations

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vaultaire-linux

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Dev
        env:
          HOST: ${{ secrets.DEV_HOST }}
          USER: ${{ secrets.SSH_USER_DEV }}
        run: |
          ssh-keyscan -t ed25519 "$HOST" >> ~/.ssh/known_hosts
          # Clear stale staging artifacts before uploading. A prior failed deploy or a
          # stray instance can leave /tmp/vaultaire-linux behind; unlinking frees the
          # path even when the file is still held by a running process, which otherwise
          # makes scp fail with "dest open ... Failure" (ETXTBSY).
          ssh "${USER}@${HOST}" 'rm -f /tmp/vaultaire-linux; rm -rf /tmp/vaultaire-migrations'
          scp vaultaire-linux "${USER}@${HOST}:/tmp/"
          scp -r internal/database/migrations "${USER}@${HOST}:/tmp/vaultaire-migrations"
          ssh "${USER}@${HOST}" 'bash -s' <<'EOF'
          set -e
          for f in $(ls /tmp/vaultaire-migrations/*.sql | sort); do
            # -w + </dev/null: if the DB password is unavailable, psql must FAIL,
            # not prompt — a prompt reads the rest of this script off stdin as
            # password attempts, silently skipping the binary swap below while
            # the job still exits 0 (observed 2026-06-08..07-09 on prod).
            PGPASSWORD=$(grep DB_PASSWORD /opt/vaultaire/configs/.env | cut -d= -f2) \
              psql -w -v ON_ERROR_STOP=1 -h 127.0.0.1 -U vaultaire -d vaultaire -f "$f" < /dev/null
          done
          # Keep the previous binary for one-command rollback.
          cp -f /opt/vaultaire/bin/vaultaire /opt/vaultaire/bin/vaultaire.prev 2>/dev/null || true
          sudo /bin/systemctl stop vaultaire
          sudo /bin/mv /tmp/vaultaire-linux /opt/vaultaire/bin/vaultaire
          sudo /bin/chmod +x /opt/vaultaire/bin/vaultaire
          sudo /bin/systemctl start vaultaire
          sleep 15
          # Gate on LIVENESS (/health/live), not readiness (/health): /health
          # returns 503 when an external backend is unreachable, which a
          # rollback cannot fix — the old binary would 503 too. /health/live
          # answers the only question a binary swap can affect: does the new
          # process boot and serve HTTP.
          if ! curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health/live; then
            echo "Health check FAILED — rolling back to previous binary"
            # Rollback reuses exactly the NOPASSWD'd commands (systemctl,
            # mv /tmp/vaultaire-linux, chmod): stage .prev via /tmp because
            # 'sudo cp' is not in the sudoers allowlist.
            sudo /bin/systemctl stop vaultaire
            cp -f /opt/vaultaire/bin/vaultaire.prev /tmp/vaultaire-linux
            sudo /bin/mv /tmp/vaultaire-linux /opt/vaultaire/bin/vaultaire
            sudo /bin/chmod +x /opt/vaultaire/bin/vaultaire
            sudo /bin/systemctl start vaultaire
            sleep 5
            curl -sf http://localhost:8000/health/live \
              && echo "Rollback binary is serving" \
              || echo "Rollback ALSO unhealthy — manual intervention required"
            exit 1
          fi
          rm -rf /tmp/vaultaire-migrations
          EOF

  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for migrations)
        uses: actions/checkout@v7
        with:
          sparse-checkout: internal/database/migrations

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vaultaire-linux

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Production (SLC)
        env:
          HOST: ${{ secrets.PROD_SLC_HOST }}
          USER: ${{ secrets.SSH_USER_PROD }}
        run: |
          ssh-keyscan -t ed25519 "$HOST" >> ~/.ssh/known_hosts
          # Clear stale staging artifacts before uploading. A prior failed deploy or a
          # stray instance can leave /tmp/vaultaire-linux behind; unlinking frees the
          # path even when the file is still held by a running process, which otherwise
          # makes scp fail with "dest open ... Failure" (ETXTBSY).
          ssh "${USER}@${HOST}" 'rm -f /tmp/vaultaire-linux; rm -rf /tmp/vaultaire-migrations'
          scp vaultaire-linux "${USER}@${HOST}:/tmp/"
          scp -r internal/database/migrations "${USER}@${HOST}:/tmp/vaultaire-migrations"
          ssh "${USER}@${HOST}" 'bash -s' <<'EOF'
          set -e
          for f in $(ls /tmp/vaultaire-migrations/*.sql | sort); do
            # -w + </dev/null: if the DB password is unavailable, psql must FAIL,
            # not prompt — a prompt reads the rest of this script off stdin as
            # password attempts, silently skipping the binary swap below while
            # the job still exits 0 (observed 2026-06-08..07-09 on prod).
            PGPASSWORD=$(grep DB_PASSWORD /opt/vaultaire/configs/.env | cut -d= -f2) \
              psql -w -v ON_ERROR_STOP=1 -h 127.0.0.1 -U vaultaire -d vaultaire -f "$f" < /dev/null
          done
          # Keep the previous binary for one-command rollback.
          cp -f /opt/vaultaire/bin/vaultaire /opt/vaultaire/bin/vaultaire.prev 2>/dev/null || true
          sudo /bin/systemctl stop vaultaire
          sudo /bin/mv /tmp/vaultaire-linux /opt/vaultaire/bin/vaultaire
          sudo /bin/chmod +x /opt/vaultaire/bin/vaultaire
          sudo /bin/systemctl start vaultaire
          sleep 15
          # Gate on LIVENESS (/health/live), not readiness (/health): /health
          # returns 503 when an external backend is unreachable, which a
          # rollback cannot fix — the old binary would 503 too. /health/live
          # answers the only question a binary swap can affect: does the new
          # process boot and serve HTTP.
          if ! curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health/live; then
            echo "Health check FAILED — rolling back to previous binary"
            # Rollback reuses exactly the NOPASSWD'd commands (systemctl,
            # mv /tmp/vaultaire-linux, chmod): stage .prev via /tmp because
            # 'sudo cp' is not in the sudoers allowlist.
            sudo /bin/systemctl stop vaultaire
            cp -f /opt/vaultaire/bin/vaultaire.prev /tmp/vaultaire-linux
            sudo /bin/mv /tmp/vaultaire-linux /opt/vaultaire/bin/vaultaire
            sudo /bin/chmod +x /opt/vaultaire/bin/vaultaire
            sudo /bin/systemctl start vaultaire
            sleep 5
            curl -sf http://localhost:8000/health/live \
              && echo "Rollback binary is serving" \
              || echo "Rollback ALSO unhealthy — manual intervention required"
            exit 1
          fi
          rm -rf /tmp/vaultaire-migrations
          EOF
