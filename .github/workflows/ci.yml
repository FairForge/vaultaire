name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        # These packages require a real PostgreSQL instance with user 'viera'.
        # They are excluded here and run in the integration-tests workflow
        # which provisions a proper DB service. Fix tracked in Step 488.
        run: |
          go test $(go list ./... | grep -v \
            "internal/api$\|internal/audit\|internal/auth/db")

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
