name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaultaire
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up database
        run: |
          psql -h localhost -U postgres -c "CREATE USER viera SUPERUSER;" || true
          psql -h localhost -U postgres -c "CREATE DATABASE vaultaire OWNER viera;" || true
          # ON_ERROR_STOP: without it psql exits 0 even when statements fail,
          # so a broken migration sails through CI and only detonates on the
          # (equally strict since WP-9) prod deploy runner.
          for f in internal/database/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -h localhost -U viera -d vaultaire -f "$f"
          done

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...
        env:
          DATABASE_URL: postgres://viera@localhost:5432/vaultaire?sslmode=disable
          JWT_SECRET: ci-test-secret-not-for-production
          TEST_DB_HOST: localhost
          TEST_DB_NAME: vaultaire
          TEST_DB_USER: viera
          TEST_DB_PASSWORD: ""

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0

      - name: Smoke test
        run: |
          go build -o vaultaire cmd/vaultaire/main.go
          ./vaultaire &
          sleep 5
          # Liveness smoke: assert the server booted and serves HTTP — NOT that
          # backends are ready. /health is a READINESS probe that returns 503
          # when an external backend (e.g. the decommissioned quotaless endpoint)
          # is unreachable; that says nothing about whether the build is good and
          # can't be retried away when the host is persistently down. /health/live
          # and /status always return 200 once the process is up.
          curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health/live
          curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/status > /dev/null
        env:
          DATABASE_URL: postgres://viera@localhost:5432/vaultaire?sslmode=disable
          JWT_SECRET: ci-test-secret-not-for-production
          PORT: "8000"
